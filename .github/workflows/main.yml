name: SFTP Upload (Overwrite Only)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sftp-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload to SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.ser }}      # Menggunakan 'server', bukan 'host'
          username: ${{ secrets.usr }}
          password: ${{ secrets.psw }}
          port: 22
          local_path: './public_html/'
          remote_path: 'public_html'
          sftpArgs: '-o StrictHostKeyChecking=no' # Menggunakan 'sftpArgs', bukan 'sftp_args'
