name: Upload via SFTP (Overwrite Only)

on:
  push:
    branches: [ "main" ] # Sesuaikan dengan branch utama Anda
  workflow_dispatch:     # Memungkinkan trigger manual dari tab Actions

jobs:
  sftp-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files to SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.0.4
        with:
          username: ${{ secrets.usr }}
          password: ${{ secrets.psw }}
          server:   ${{ secrets.ser }}
          port:     22                # Ganti jika SFTP Anda menggunakan port lain
          local_dir: './public_html'             # Folder di repo yang ingin diupload (misal: './dist', './public', dll)
          remote_dir: './public_html' # Path tujuan di server SFTP
          args: '-o StrictHostKeyChecking=no -o ConnectTimeout=10'
