name: SFTP Upload (Overwrite Only)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sftp-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload to SFTP
        uses: cross-the-world/sftp-upload-action@v1.6.1
        with:
          host: ${{ secrets.ser }}
          user: ${{ secrets.usr }}
          pass: ${{ secrets.psw }}
          port: 22
          local_path: './public_html/*' # Mengupload isi folder public_html
          remote_path: 'public_html'    # Sesuai folder yang terlihat di gambar Anda
          args: '-o StrictHostKeyChecking=no'
