name: SFTP Upload (Overwrite Only)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sftp-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload to SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.ser }}
          username: ${{ secrets.usr }}
          password: ${{ secrets.psw }}
          port: 22
          local_path: './public_html/'  # Folder di repo GitHub Anda
          remote_path: 'public_html'    # Folder tujuan di server (sesuai gambar)
